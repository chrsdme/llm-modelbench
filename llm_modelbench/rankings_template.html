<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LLM ModelBench - Master Rankings</title>
<style>
:root{--bg:#0b0e14;--panel:#121722;--panel2:#171e2b;--line:#293247;--text:#edf1f7;--muted:#98a3b6;--accent:#76a7ff;--good:#47d7a0;--warn:#f4bd62;--bad:#ff7185;--violet:#b49cff;--shadow:0 14px 38px rgba(0,0,0,.24)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font:14px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input{font:inherit}.app{display:grid;grid-template-columns:285px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;overflow:auto;background:linear-gradient(180deg,#141a26,#0f141e);border-right:1px solid var(--line);padding:22px 15px}.brand{padding:0 9px 18px}.brand strong{font-size:18px}.brand small{display:block;color:var(--muted);margin-top:3px}.search{width:100%;background:#0b1019;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:10px 11px;outline:none}.search:focus{border-color:var(--accent)}.nav-title{margin:20px 10px 6px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.11em}.nav{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--muted);padding:9px 10px;border-radius:8px;cursor:pointer}.nav:hover,.nav.active{background:#202a3c;color:var(--text)}.nav.active{box-shadow:inset 3px 0 var(--accent)}#modelNav{margin-top:7px}.model-nav{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.main{min-width:0;padding:30px clamp(20px,4vw,58px) 70px}.hero{display:flex;gap:18px;justify-content:space-between;align-items:flex-start;margin-bottom:22px}.hero h1{margin:0;font-size:28px}.hero p{margin:6px 0 0;color:var(--muted)}.stamp{color:var(--muted);font-size:12px}.stats{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:12px;margin:18px 0 26px}.stat,.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}.stat{padding:16px}.stat b{display:block;font-size:23px}.stat span{color:var(--muted);font-size:12px}.card{padding:20px;margin-bottom:16px}.card h2,.card h3{margin:0 0 10px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:15px}.scroll{overflow:auto;border:1px solid var(--line);border-radius:10px}table{width:100%;border-collapse:collapse;min-width:780px;background:rgba(10,14,21,.28)}th,td{padding:10px 11px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{position:sticky;top:0;background:#171e2b;color:#b7c1d1;font-size:12px;text-transform:uppercase;letter-spacing:.035em;z-index:1}tbody tr{cursor:pointer}tbody tr:hover{background:#1b2434}.num{font-variant-numeric:tabular-nums;text-align:right}.muted{color:var(--muted)}.pill{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:650;border:1px solid transparent}.complete{color:var(--good);background:rgba(71,215,160,.12);border-color:rgba(71,215,160,.25)}.provisional{color:var(--warn);background:rgba(244,189,98,.12);border-color:rgba(244,189,98,.25)}.ineligible{color:var(--bad);background:rgba(255,113,133,.12);border-color:rgba(255,113,133,.25)}.band{color:var(--violet);background:rgba(180,156,255,.12);border-color:rgba(180,156,255,.25)}.tag{display:inline-block;padding:2px 7px;margin:2px;border-radius:6px;background:#202a3b;color:#c7d1df;font-size:11px}.score{font-size:18px;font-weight:750}.bar{height:7px;background:#252e3e;border-radius:99px;overflow:hidden;min-width:90px;margin-top:4px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--good))}.reason{margin:6px 0;color:var(--muted)}.warning-list{padding-left:18px;color:var(--warn)}.kv{display:grid;grid-template-columns:minmax(145px,.45fr) 1fr;gap:7px 15px}.kv div:nth-child(odd){color:var(--muted)}details{border-top:1px solid var(--line);padding-top:12px;margin-top:12px}summary{cursor:pointer;color:#d9e2ef;font-weight:650}.task-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:12px}.task{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px}.task h4{margin:0 0 7px}.task pre{white-space:pre-wrap;word-break:break-word;max-height:190px;overflow:auto;background:#0b1018;border:1px solid var(--line);padding:10px;border-radius:8px;font-size:12px}.small{font-size:12px}.history-current{box-shadow:inset 3px 0 var(--good)}.empty{padding:25px;text-align:center;color:var(--muted)}.top-list{margin:0;padding:0;list-style:none}.top-list li{display:grid;grid-template-columns:28px minmax(0,1fr) 70px;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}.top-list a{color:var(--text);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.top-list a:hover{color:var(--accent)}code{background:#20283a;padding:2px 5px;border-radius:5px}.method p{color:var(--muted)}.back{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:8px 11px;border-radius:8px;cursor:pointer}.back:hover{border-color:var(--accent)}@media(max-width:900px){.app{display:block}.side{position:relative;width:auto;height:auto}.model-list-section{display:none}.main{padding:22px 15px 60px}.stats{grid-template-columns:repeat(2,1fr)}.hero{display:block}.stamp{margin-top:8px}}@media print{.side{display:none}.app{display:block}.main{padding:0}.card,.stat{box-shadow:none}}
</style>
</head>
<body>
<div class="app">
<aside class="side">
  <div class="brand"><strong>LLM ModelBench</strong><small>Persistent evidence and rankings</small></div>
  <button class="nav active" data-view="overall">Overall rankings</button>
  <button class="nav" data-view="categories">Top 5 by category</button>
  <button class="nav" data-view="classes">Top 5 by class</button>
  <button class="nav" data-view="multimodal">Multimodal ranking</button>
  <button class="nav" data-view="methodology">Methodology</button>
  <div class="model-list-section">
    <div class="nav-title">Model cards</div>
    <input id="search" class="search" placeholder="Search models">
    <div id="modelNav"></div>
  </div>
</aside>
<main id="main" class="main"></main>
</div>
<script>
const DATA=__MASTER_SUMMARY_JSON__;
const models=DATA.models||[];
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const n=v=>typeof v==="number"&&Number.isFinite(v);
const fmt=v=>n(v)?v.toFixed(2):"-";
const secs=v=>!n(v)?"-":v>=3600?`${(v/3600).toFixed(1)}h`:v>=60?`${Math.floor(v/60)}m ${Math.round(v%60)}s`:`${v.toFixed(1)}s`;
const pct=v=>n(v)?`${Math.round(v*100)}%`:"-";
const status=m=>`<span class="pill ${esc(m.quality_status)}">${esc(m.quality_status)}</span>`;
const lcStatus=s=>{const cls=s==="ready"?"complete":(["slow","verified_speed_unavailable"].includes(s)?"provisional":(["impractical_speed","behavior_warning"].includes(s)?"ineligible":"band"));return `<span class="pill ${cls}">${esc(s||"not_verified")}</span>`};
const tags=arr=>(arr||[]).map(x=>`<span class="tag">${esc(x)}</span>`).join("");
const goModel=d=>{location.hash=`model:${encodeURIComponent(d)}`};
function header(title,sub=""){return `<div class="hero"><div><h1>${esc(title)}</h1><p>${esc(sub)}</p></div><div class="stamp">Generated ${esc(DATA.generated_at||"")}</div></div>`}
function statBlock(){const s=DATA.status_counts||{};return `<div class="stats"><div class="stat"><b>${models.length}</b><span>models with preserved evidence</span></div><div class="stat"><b>${s.complete||0}</b><span>complete current quality scope</span></div><div class="stat"><b>${s.provisional||0}</b><span>provisional rankings</span></div><div class="stat"><b>${s.ineligible||0}</b><span>ineligible for quality ranking</span></div></div>`}
function overall(){const rows=models.filter(m=>m.overall_comparable&&n(m.overall_mean_score)).map(m=>`<tr onclick="goModel('${encodeURIComponent(m.digest)}')"><td class="num">${m.overall_rank??"-"}</td><td><b>${esc(m.display_name)}</b><div class="small muted">${esc(m.parameter_size||"?")} · ${esc(m.quantization_level||"?")}</div></td><td>${esc(m.class||"-")}</td><td class="num"><span class="score">${fmt(m.overall_mean_score)}</span></td><td><span class="pill band">Band ${m.tie_band??"-"}</span></td><td>${status(m)}</td><td><div>${pct(m.coverage_ratio)}</div><div class="bar"><i style="width:${Math.max(0,Math.min(100,(m.coverage_ratio||0)*100))}%"></i></div></td><td class="num">${fmt(m.tok_s)}</td><td class="num">${fmt(m.size_gb)} GB</td><td class="num">${m.history_count||0}</td></tr>`).join("");document.getElementById("main").innerHTML=header("Master rankings","Quality is separate from speed and size. Rows within 0.5 points share a quality tie band.")+statBlock()+`<div class="card"><div class="scroll"><table><thead><tr><th>#</th><th>Model</th><th>Class</th><th class="num">Quality</th><th>Tie</th><th>Status</th><th>Scope</th><th class="num">tok/s</th><th class="num">Size</th><th class="num">History</th></tr></thead><tbody>${rows||`<tr><td colspan="10" class="empty">No eligible scores</td></tr>`}</tbody></table></div></div>`}
function topSections(source,title,sub){const groups=Object.entries(source||{}).sort((a,b)=>a[0].localeCompare(b[0])).map(([name,rows])=>`<div class="card"><h3>${esc(name)}</h3><ol class="top-list">${(rows||[]).map((r,i)=>`<li><span>${i+1}</span><a href="#model:${encodeURIComponent(r.digest)}">${esc(r.model)}</a><b class="num">${fmt(r.score)}</b></li>`).join("")||`<li class="muted">No eligible results</li>`}</ol></div>`).join("");document.getElementById("main").innerHTML=header(title,sub)+`<div class="grid">${groups}</div>`}
function multimodal(){const rows=(DATA.multimodal||[]).map((r,i)=>`<tr onclick="goModel('${encodeURIComponent(r.digest)}')"><td>${i+1}</td><td><b>${esc(r.model)}</b></td><td class="num"><span class="score">${fmt(r.score)}</span></td><td>${esc(r.status)}</td><td>${pct(r.coverage)}</td><td class="num">${fmt(r.tok_s)}</td><td class="num">${fmt(r.size_gb)} GB</td></tr>`).join("");document.getElementById("main").innerHTML=header("Multimodal ranking","Weighted OCR and PDF evidence. Equal scores indicate a ceiling, not a hidden quality ordering.")+`<div class="card"><div class="scroll"><table><thead><tr><th>#</th><th>Model</th><th class="num">Multimodal</th><th>Status</th><th>Overall scope</th><th class="num">tok/s</th><th class="num">Size</th></tr></thead><tbody>${rows||`<tr><td colspan="7" class="empty">No multimodal evidence</td></tr>`}</tbody></table></div></div>`}
function methodology(){const m=DATA.methodology||{};const weights=Object.entries(m.weights||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td class="num">${fmt(v)}</td></tr>`).join("");document.getElementById("main").innerHTML=header("Methodology","How current evidence is selected, scored and labelled")+`<div class="grid method"><div class="card"><h3>Current evidence selection</h3><p>${esc(m.selection)}</p><h3>Category score</h3><p>${esc(m.category_score)}</p><h3>Overall score</h3><p>${esc(m.overall_score)}</p><p>${esc(m.overall_scope||"")}</p><h3>Ties</h3><p>Scores within ${esc(m.tie_band_points)} points share a band. Display ordering then uses ${esc((m.tie_breakers||[]).join(", "))}; these do not alter quality.</p></div><div class="card"><h3>Evidence status</h3>${Object.entries(m.status||{}).map(([k,v])=>`<p><span class="pill ${esc(k)}">${esc(k)}</span> ${esc(v)}</p>`).join("")}<h3>Category weights</h3><div class="scroll"><table><thead><tr><th>Category</th><th class="num">Weight</th></tr></thead><tbody>${weights}</tbody></table></div></div></div>`}
function taskCard(t){return `<div class="task"><h4>${esc(t.task)} <span class="pill ${t.error_kind?'ineligible':'complete'}">${t.error_kind?esc(t.error_kind):fmt(t.score)}</span></h4><div class="small muted">${esc(t.category||"")} · ${esc(t.family||"")} · scorer ${esc(t.scorer||"-")} · difficulty ${fmt(t.difficulty)}</div><p>${esc(t.reason||"")}</p><div class="kv small"><div>Run</div><div>${esc(t.run_id||"-")}</div><div>Generation</div><div>ctx=${esc(t.num_ctx_used??"default")}, predict=${esc(t.num_predict??"default")}, think=${esc(t.think_sent??"-")}, samples=${esc(t.samples_used??1)}</div><div>Judge</div><div>${esc(t.judge_mode||"off")} ${t.judge_model?`(${esc(t.judge_model)})`:""}${t.posthoc_judged?" · post-hoc":""}</div><div>Timing</div><div>${secs(t.task_wall_seconds)} · ${fmt(t.tps)} tok/s · TTFT ${fmt(t.ttft_ms)} ms · VRAM ${fmt(t.vram_peak_mb)} MB</div></div><details><summary>Prompt, rubric and expected evidence</summary><pre>${esc(t.prompt||"")}</pre>${t.rubric?`<p><b>Rubric:</b> ${esc(t.rubric)}</p>`:""}<pre>${esc(JSON.stringify(t.expectation||{},null,2))}</pre></details></div>`}
function longContextCard(m){const p=m.long_context_profile;if(!p)return "";const rows=(p.depths||[]).map(d=>`<tr><td>${esc(d.size||"-")}</td><td class="num">${esc(d.num_ctx||"-")}</td><td>${d.found?'<span class="pill complete">pass</span>':(d.error_kind?`<span class="pill ineligible">${esc(d.error_kind)}</span>`:'-')}</td><td class="num">${fmt(d.prompt_tps)}</td><td class="num">${fmt(d.tps)}</td><td class="num">${secs(d.elapsed_seconds)}</td><td class="num">${fmt(d.vram_peak_mb)} MB</td><td class="num">${fmt(d.ollama_pss_delta_peak_mb??d.ollama_rss_delta_peak_mb??d.ram_delta_peak_mb)} MB</td><td class="num">${fmt(d.swap_delta_peak_mb)} MB</td><td class="num">${pct(d.offload_fraction)}</td><td>${d.response_suspect?'<span class="pill provisional">suspect</span>':(d.response_exact?'<span class="pill complete">exact</span>':'-')}</td></tr>`).join("");return `<div class="card"><h2>Long-context operating profile</h2><div class="kv"><div>Verified context</div><div>${esc(p.max_verified_ctx||"-")}</div><div>Coverage / score</div><div>${pct(p.coverage)} / ${fmt(p.score)}</div><div>${esc(p.target_ctx||64000)}-token operating status</div><div>${lcStatus(p.target_status)}</div><div>Target prefill / decode</div><div>${fmt(p.target_prompt_tps)} / ${fmt(p.target_tps)} tok/s</div><div>Target elapsed</div><div>${secs(p.target_elapsed_seconds)}</div><div>Target offload</div><div>${pct(p.target_offload_fraction)}</div><div>Minimum generation speed</div><div>${fmt(p.min_tps)} tok/s</div><div>Maximum offload</div><div>${pct(p.max_offload_fraction)}</div><div>Maximum process RAM delta</div><div>${fmt(p.max_ollama_pss_delta_mb??p.max_ollama_rss_delta_mb??p.max_ram_delta_mb)} MB</div><div>Maximum swap delta</div><div>${fmt(p.max_swap_delta_mb)} MB</div><div>Slow depths (&lt;${fmt(p.target_min_tps)} tok/s)</div><div>${esc((p.slow_depths||[]).join(", ")||"none")}</div><div>Behavior warning</div><div>${p.behavior_suspect?'<span class="pill provisional">suspect output shape</span>':'none observed'}</div></div><p class="muted small">Host-memory values prefer Ollama-process PSS/RSS deltas. System RAM deltas are fallback evidence and may include unrelated activity. Offload from /api/ps describes model residency, not exact KV-cache bytes.</p><div class="scroll"><table><thead><tr><th>Depth</th><th class="num">num_ctx</th><th>Result</th><th class="num">prompt tok/s</th><th class="num">decode tok/s</th><th class="num">Elapsed</th><th class="num">VRAM peak</th><th class="num">Host delta</th><th class="num">Swap delta</th><th class="num">Offload</th><th>Output</th></tr></thead><tbody>${rows||`<tr><td colspan="11" class="empty">No per-depth telemetry</td></tr>`}</tbody></table></div></div>`}

function historyTable(m){const rows=(m.history||[]).map(h=>`<tr class="${h.used_for_current_ranking?'history-current':''}"><td>${h.used_for_current_ranking?'<span class="pill complete">current</span>':'historical'}</td><td>${esc(h.timestamp||"-")}</td><td>${esc(h.run_id||"-")}</td><td>${esc(h.model_name||"-")}</td><td>${esc(h.task||"-")}</td><td>${esc(h.category||"-")}</td><td class="num">${fmt(h.score)}</td><td>${h.error_kind?`<span class="pill ineligible">${esc(h.error_kind)}</span>`:esc(h.reason||"")}</td><td>${esc(h.level||"-")}</td><td>${esc(h.benchmark_version||"-")}</td><td>${secs(h.task_wall_seconds)}</td><td class="num">${fmt(h.tps)}</td><td>${h.posthoc_judged?`post-hoc ${esc(h.judge_mode||"")}`:esc(h.judge_mode||"off")}</td></tr>`).join("");return `<div class="card"><h2>Complete historical test evidence <span class="muted small">(${m.history_count||0} attempts)</span></h2><p class="muted">Green-marked rows are selected for the current ranking. Other rows are retained for audit, repeatability and regressions.</p><div class="scroll"><table><thead><tr><th>Use</th><th>Time</th><th>Run</th><th>Model name</th><th>Task</th><th>Category</th><th class="num">Score</th><th>Outcome</th><th>Level</th><th>Version</th><th>Wall</th><th class="num">tok/s</th><th>Judge</th></tr></thead><tbody>${rows||`<tr><td colspan="13" class="empty">No history</td></tr>`}</tbody></table></div></div>`}
function modelView(digest){const m=models.find(x=>x.digest===digest);if(!m){overall();return}const cats=Object.entries(m.categories||{}).sort((a,b)=>a[0].localeCompare(b[0])).map(([cat,c])=>`<div class="card"><h2>${esc(cat)} <span class="score" style="float:right">${fmt(c.score)}</span></h2><p class="muted">${c.task_count||0} current task result(s), ${c.error_count||0} error(s), coverage ${esc(c.coverage??"-")}, timing ${secs(c.wall_seconds)} (${esc(c.timing_basis||"-")})</p>${c.ineligible_reason?`<p class="reason">Ineligible: ${esc(c.ineligible_reason)}</p>`:""}<div class="task-grid">${(c.tasks||[]).map(t=>taskCard({...t,category:cat})).join("")}</div></div>`).join("");document.getElementById("main").innerHTML=`<button class="back" onclick="location.hash='overall'">Back to rankings</button>`+header(m.display_name,`${m.class||"unclassified"} · digest ${String(m.digest).slice(0,16)}...`)+`<div class="grid"><div class="card"><h2>Current ranking</h2><div class="kv"><div>Overall quality</div><div><span class="score">${fmt(m.overall_mean_score)}</span> · rank ${m.overall_rank??"-"} · tie band ${m.tie_band??"-"}</div><div>Status</div><div>${status(m)}</div><div>Scope coverage</div><div>${pct(m.coverage_ratio)}</div><div>Applicable tasks</div><div>${(m.required_quality_tasks||[]).length}</div><div>Missing/stale</div><div>${(m.missing_quality_tasks||[]).length} / ${(m.stale_quality_tasks||[]).length}</div><div>Measured speed</div><div>${fmt(m.tok_s)} tok/s</div><div>Model test time</div><div>${secs(m.total_wall_seconds)} (${esc(m.total_timing_basis||"-")})</div></div><ul class="warning-list">${(m.quality_status_reasons||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div><div class="card"><h2>Model identity and capabilities</h2><div class="kv"><div>Parameters</div><div>${esc(m.parameter_size||"unknown")}</div><div>Quantization</div><div>${esc(m.quantization_level||"unknown")}</div><div>Architecture</div><div>${esc(m.architecture_family||"unknown")}</div><div>Stored size</div><div>${fmt(m.size_gb)} GB</div><div>Classes/families</div><div>${tags([m.class,...(m.families||[])])}</div><div>Ollama capabilities</div><div>${tags(m.declared_capabilities||[])||'<span class="muted">not stored</span>'}</div><div>Names seen</div><div>${(m.names_seen||[]).map(esc).join("<br>")}</div></div></div></div>${(m.missing_quality_tasks||[]).length?`<div class="card"><h3>Missing or non-current quality tasks</h3>${tags(m.missing_quality_tasks)}</div>`:""}${longContextCard(m)}${cats}${historyTable(m)}`}
function renderNav(){const q=(document.getElementById("search").value||"").toLowerCase();document.getElementById("modelNav").innerHTML=[...models].sort((a,b)=>a.display_name.localeCompare(b.display_name)).filter(m=>m.display_name.toLowerCase().includes(q)).map(m=>`<button class="nav model-nav" onclick="goModel('${encodeURIComponent(m.digest)}')">${esc(m.display_name)}</button>`).join("")}
function route(){document.querySelectorAll('.nav[data-view]').forEach(x=>x.classList.remove('active'));const h=location.hash.slice(1)||"overall";if(h.startsWith("model:")){modelView(decodeURIComponent(h.slice(6)));return}const btn=document.querySelector(`.nav[data-view="${CSS.escape(h)}"]`);if(btn)btn.classList.add('active');if(h==="categories")topSections(DATA.top_by_category,"Top five by category","Category-specific quality, independent of model class");else if(h==="classes")topSections(DATA.top_by_class,"Top five by class","Current overall quality within each inferred operational class");else if(h==="multimodal")multimodal();else if(h==="methodology")methodology();else overall()}
document.querySelectorAll('.nav[data-view]').forEach(b=>b.onclick=()=>{location.hash=b.dataset.view});document.getElementById("search").oninput=renderNav;window.onhashchange=route;renderNav();route();
</script>
</body>
</html>
